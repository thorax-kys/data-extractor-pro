# Railway uses Nixpacks for builds
# Install system packages needed for media extraction
[phases.setup]
aptPkgs = ["python3", "python3-pip", "ffmpeg"]

# Install yt-dlp via pip, skip npm postinstall scripts (yt-dlp-exec's
# postinstall requires python on PATH during build and breaks npm ci)
[phases.install]
cmds = ["pip3 install --break-system-packages yt-dlp", "npm ci --ignore-scripts"]

# ffmpeg-static needs its postinstall to download the binary, but we
# have system ffmpeg via apt so it's not needed. yt-dlp is on PATH via pip.
